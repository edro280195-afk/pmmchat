<div class="login-page">
  <!-- Interactive Multi-Layer Particle System -->
  <canvas id="bg-canvas" #networkCanvas></canvas>

  <!-- Nebula Orbs -->
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <div class="card-scene">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div class="logo-wrap">
          <div class="logo-halo"></div>
          <div class="logo-face">
            <img [src]="logoPath" (error)="onLogoError()" alt="Logo" class="logo-img" width="80" height="80" />
          </div>
        </div>
        <h1 class="card-title">PMMChat</h1>
        <p class="card-sub">Inicia sesión para continuar</p>
      </div>

      <!-- Form -->
      <form class="form" (ngSubmit)="onSubmit()">

        <!-- Error Message -->
        @if (error()) {
        <div class="error-toast animate-in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="error-icon">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span>{{ error() }}</span>
        </div>
        }

        <!-- Username Field -->
        <div class="field" id="field-user">
          <input id="claveUsuario" name="claveUsuario" type="text" placeholder="x" autocomplete="off"
            [(ngModel)]="claveUsuario" [disabled]="loading()" (keyup.enter)="onSubmit()">
          <label for="claveUsuario">Clave de usuario</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>

        <!-- Password Field -->
        <div class="field" id="field-pass">
          <input id="password" name="password" [type]="passShowing ? 'text' : 'password'" placeholder="x"
            autocomplete="current-password" [(ngModel)]="password" [disabled]="loading()"
            (keyup.enter)="onSubmit()">
          <label for="password">Contraseña</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <button type="button" class="toggle-pass" (click)="togglePass()">
            @if (passShowing) {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            }
          </button>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn" [class.loading]="loading()" [disabled]="loading()">
          <div class="btn-content">
            @if (!loading()) {
            <span class="btn-text-wrap">
              <span>Ingresar</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </span>
            } @else {
            <span class="btn-dots">
              <span></span><span></span><span></span>
            </span>
            }
          </div>
        </button>

      </form>

      <p class="footer">PMMChat beta 1.1.1</p>

    </div>
  </div>
</div>
